name: Life-Agent Scheduled Execution

on:
  schedule:
    - cron: '0 9 * * *'
    - cron: '0 16 * * *'
  workflow_dispatch:
    inputs:
      photo_url:
        description: 'Photo URL from iOS Shortcut'
        required: false
        type: string
      text:
        description: 'Text/Speech content from iOS Shortcut'
        required: false
        type: string

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Life-Agent
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NOTION_FIXED_SCHEDULE_DB_ID: ${{ secrets.NOTION_FIXED_SCHEDULE_DB_ID }}
          NOTION_TODO_ACTIVITIES_DB_ID: ${{ secrets.NOTION_TODO_ACTIVITIES_DB_ID }}
          NOTION_ACTIVITIES_DB_ID: ${{ secrets.NOTION_ACTIVITIES_DB_ID }}
          NOTION_BOOK_TRACKER_DB_ID: ${{ secrets.NOTION_BOOK_TRACKER_DB_ID }}
          NOTION_LEDGER_DB_ID: ${{ secrets.NOTION_LEDGER_DB_ID }}
          NOTION_WEEKLY_CALENDAR_DB_ID: ${{ secrets.NOTION_WEEKLY_CALENDAR_DB_ID }}
          NOTION_TEMP_INBOX_DB_ID: ${{ secrets.NOTION_TEMP_INBOX_DB_ID }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
          GOOGLE_CALENDAR_ID_CLASS: ${{ secrets.GOOGLE_CALENDAR_ID_CLASS }}
          GOOGLE_CALENDAR_ID_STUDY: ${{ secrets.GOOGLE_CALENDAR_ID_STUDY }}
          GOOGLE_CALENDAR_ID_TASK: ${{ secrets.GOOGLE_CALENDAR_ID_TASK }}
          GOOGLE_CALENDAR_ID_ACTIVITY: ${{ secrets.GOOGLE_CALENDAR_ID_ACTIVITY }}
          GOOGLE_CALENDAR_ID_MISC: ${{ secrets.GOOGLE_CALENDAR_ID_MISC }}
          SHORTCUT_PHOTO_URL: ${{ github.event.inputs.photo_url }}
          SHORTCUT_TEXT: ${{ github.event.inputs.text }}
        run: python main.py

      - name: Sync Notion to Google Calendar
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_TODO_ACTIVITIES_DB_ID: ${{ secrets.NOTION_TODO_ACTIVITIES_DB_ID }}
          NOTION_ACTIVITIES_DB_ID: ${{ secrets.NOTION_ACTIVITIES_DB_ID }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
          GOOGLE_CALENDAR_ID_TASK: ${{ secrets.GOOGLE_CALENDAR_ID_TASK }}
          GOOGLE_CALENDAR_ID_ACTIVITY: ${{ secrets.GOOGLE_CALENDAR_ID_ACTIVITY }}
        run: python import_notion_to_gcal.py

      - name: AI Schedule Todos to Google Calendar
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_TODO_ACTIVITIES_DB_ID: ${{ secrets.NOTION_TODO_ACTIVITIES_DB_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
          GOOGLE_CALENDAR_ID_CLASS: ${{ secrets.GOOGLE_CALENDAR_ID_CLASS }}
          GOOGLE_CALENDAR_ID_STUDY: ${{ secrets.GOOGLE_CALENDAR_ID_STUDY }}
          GOOGLE_CALENDAR_ID_TASK: ${{ secrets.GOOGLE_CALENDAR_ID_TASK }}
          GOOGLE_CALENDAR_ID_ACTIVITY: ${{ secrets.GOOGLE_CALENDAR_ID_ACTIVITY }}
        run: python schedule_todos.py
