name: Life-Agent Scheduled Execution

on:
  schedule:
    - cron: '0 9 * * *'
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Life-Agent
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NOTION_FIXED_SCHEDULE_DB_ID: ${{ secrets.NOTION_FIXED_SCHEDULE_DB_ID }}
          NOTION_TODO_ACTIVITIES_DB_ID: ${{ secrets.NOTION_TODO_ACTIVITIES_DB_ID }}
          NOTION_BOOK_TRACKER_DB_ID: ${{ secrets.NOTION_BOOK_TRACKER_DB_ID }}
          NOTION_LEDGER_DB_ID: ${{ secrets.NOTION_LEDGER_DB_ID }}
          NOTION_WEEKLY_CALENDAR_DB_ID: ${{ secrets.NOTION_WEEKLY_CALENDAR_DB_ID }}
        run: python main.py
